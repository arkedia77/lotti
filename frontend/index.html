<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Lotti — 로그인</title>
  <link rel="preconnect" href="https://cdn.jsdelivr.net">
  <link rel="stylesheet" as="style" onload="this.rel='stylesheet'" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Pretendard', sans-serif;
      background: #0f172a;
      color: #f1f5f9;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .login-card {
      background: #1e293b;
      border: 1px solid #334155;
      border-radius: 16px;
      padding: 48px 40px;
      width: 100%;
      max-width: 400px;
      box-shadow: 0 25px 50px rgba(0,0,0,0.5);
    }
    .logo {
      text-align: center;
      margin-bottom: 32px;
    }
    .logo h1 {
      font-size: 2rem;
      font-weight: 800;
      background: linear-gradient(135deg, #6366f1, #a78bfa);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      letter-spacing: -0.02em;
    }
    .logo p {
      font-size: 0.85rem;
      color: #64748b;
      margin-top: 4px;
    }
    .form-group {
      margin-bottom: 20px;
    }
    label {
      display: block;
      font-size: 0.85rem;
      font-weight: 600;
      color: #94a3b8;
      margin-bottom: 8px;
      letter-spacing: 0.05em;
      text-transform: uppercase;
    }
    input[type="text"] {
      width: 100%;
      padding: 12px 16px;
      background: #0f172a;
      border: 1px solid #334155;
      border-radius: 10px;
      color: #f1f5f9;
      font-family: 'Pretendard', sans-serif;
      font-size: 1rem;
      outline: none;
      transition: border-color 0.2s;
    }
    input[type="text"]:focus {
      border-color: #6366f1;
      box-shadow: 0 0 0 3px rgba(99,102,241,0.15);
    }
    input[type="text"]::placeholder { color: #475569; }
    .btn-login {
      width: 100%;
      padding: 13px;
      background: linear-gradient(135deg, #6366f1, #7c3aed);
      border: none;
      border-radius: 10px;
      color: #fff;
      font-family: 'Pretendard', sans-serif;
      font-size: 1rem;
      font-weight: 700;
      cursor: pointer;
      transition: opacity 0.2s, transform 0.1s;
    }
    .btn-login:hover { opacity: 0.9; }
    .btn-login:active { transform: scale(0.98); }
    .error-msg {
      background: rgba(239,68,68,0.1);
      border: 1px solid rgba(239,68,68,0.3);
      border-radius: 8px;
      color: #f87171;
      font-size: 0.85rem;
      padding: 10px 14px;
      margin-top: 14px;
      display: none;
    }
  </style>
</head>
<body>
  <div class="login-card">
    <div class="logo">
      <h1>LOTTI</h1>
      <p>로티 프로젝트 대시보드</p>
    </div>
    <div class="form-group">
      <label>이름</label>
      <input type="text" id="nameInput" placeholder="이름을 입력하세요" autocomplete="off">
    </div>
    <button class="btn-login" onclick="doLogin()">입장</button>
    <div class="error-msg" id="errorMsg">알 수 없는 사용자입니다</div>
  </div>

  <script>
    // Redirect if already logged in
    if (sessionStorage.getItem('user')) {
      window.location.href = 'dashboard.html';
    }

    const ALLOWED = ['lee', 'son', 'yim'];

    document.getElementById('nameInput').addEventListener('keydown', (e) => {
      if (e.key === 'Enter') doLogin();
    });

    function doLogin() {
      const raw = document.getElementById('nameInput').value.trim();
      const name = raw.toLowerCase();
      if (ALLOWED.includes(name)) {
        sessionStorage.setItem('user', name);
        window.location.href = 'dashboard.html';
      } else {
        const err = document.getElementById('errorMsg');
        err.style.display = 'block';
        document.getElementById('nameInput').focus();
      }
    }
  </script>
</body>
</html>
